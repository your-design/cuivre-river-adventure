# Cuivre River State Park Family Adventure
# A comprehensive guide for a multi-family summer camping trip

title: "Cuivre River Adventure"
author: "Kevin J. Smith"
tagline: "A Four-Family Summer Camping Trip in the Lincoln Hills"
description: >-
  Your complete guide to a week of camping, paddling, biking, and fishing at
  Cuivre River State Park near Troy, Missouri. Four families, twelve people,
  one unforgettable July week.

# Site Settings
# Served from a custom domain (see docs/CNAME), so baseurl is the site root.
# The GitHub Actions build injects the correct base_path automatically, so this
# also works if you disable the custom domain and use a project page.
baseurl: ""
url: "https://cuivre-river-adventure.your-design.app"
repository: "your-design/cuivre-river-adventure"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Theme (gem-based — works for local serving and GitLab Pages CI)
theme: just-the-docs

# Just the Docs Configuration
color_scheme: custom

logo: "/assets/images/cuivre-logo.png"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: case_sensitive
nav_external_links:
  - title: Cuivre River State Park (Official)
    url: https://mostateparks.com/park/cuivre-river-state-park
  - title: Reserve a Campsite (Missouri State Parks)
    url: https://icampmo1.usedirect.com/MoStateParksWeb/
  - title: Missouri Fishing Permits (MDC)
    url: https://mdc.mo.gov/buy-permits

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer
footer_content: "Cuivre River Family Adventure &copy; 2026. Made for four families and the summer we spent outside."

# Collections for organized content
collections:
  guides:
    output: true
    permalink: /:collection/:name
  activities:
    output: true
    permalink: /:collection/:name
  meals:
    output: true
    permalink: /:collection/:name
  itinerary:
    output: true
    permalink: /:collection/:name
  day_trips:
    output: true
    permalink: /:collection/:name

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "activities"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "meals"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "itinerary"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "day_trips"
    values:
      layout: "default"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - README.md
